name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: resttemplateserver-hub
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/resttemplateserver-hub

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Generate image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_REPOSITORY }}:latest

  update-manifest:
    name: Update K8s Manifest for ArgoCD
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s.yaml
        run: |
          NEW_IMAGE="${{ env.IMAGE_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|image: .*${{ env.IMAGE_NAME }}.*|image: ${NEW_IMAGE}|g" k8s.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push 